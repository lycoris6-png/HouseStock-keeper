<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>家庭在庫ノート</title>
  <meta name="theme-color" content="#ff7aa8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="在庫ノート">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="app-shell">

  <!-- ヘッダー -->
  <header class="app-header">
    <div class="header-copy">
      <p class="header-kicker">おうちのストックを、たのしく整える</p>
      <h1><span>家庭在庫</span><span>ノート</span></h1>
      <div class="header-pills" aria-hidden="true">
        <span>冷蔵庫</span>
        <span>日用品</span>
        <span>買い物</span>
      </div>
    </div>
    <div class="header-illustration" aria-hidden="true">
      <img src="assets/chibi_inventory_icons/Couple/Couple_01_clipboard_together.png" alt="">
      <span class="floating-item floating-can">🥫</span>
      <span class="floating-item floating-leaf">🌿</span>
      <span class="sparkle sparkle-a">✦</span>
      <span class="sparkle sparkle-b">✧</span>
      <span class="sparkle sparkle-c">✦</span>
    </div>
    <button id="syncBtn" title="Driveに同期">☁️</button>
  </header>

  <!-- ─── 在庫タブ ─── -->
  <div class="tab-content active" data-tab="stock">
    <!-- カテゴリチップ -->
    <div id="catChips" class="cat-chips"></div>
    <section id="characterTip" class="character-tip" aria-live="polite"></section>
    <!-- 品目リスト -->
    <div id="stockList" class="stock-list"></div>
  </div>

  <!-- ─── 買い物タブ ─── -->
  <div class="tab-content" data-tab="shopping">
    <div class="shopping-header">
      <h2>🛒 買い物リスト</h2>
      <button class="clear-checked-btn" onclick="clearCheckedShopItems()">購入済みを削除</button>
    </div>
    <div id="shoppingList" class="shopping-list"></div>
  </div>

  <!-- ─── 設定タブ ─── -->
  <div class="tab-content" data-tab="settings">
    <div class="settings-section">
      <h2>☁️ Google Drive 連携</h2>

      <div class="settings-row">
        <label for="settingsClientId">Google OAuth Client ID</label>
        <input type="text" id="settingsClientId" placeholder="〇〇〇.apps.googleusercontent.com">
        <p class="hint">
          <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">Google Cloud Console</a>
          でプロジェクトを作成し、OAuth 2.0 クライアント ID（Webアプリ）を発行してください。<br>
          承認済み JavaScript 生成元に <code>https://あなたのGitHub Pages URL</code> を追加します。
        </p>
      </div>

      <div class="settings-row">
        <button class="btn-primary" onclick="saveSettings()">Client ID を保存</button>
      </div>

      <div class="drive-status-row">
        <span>接続状態：</span>
        <span id="driveStatusText">未設定</span>
      </div>

      <div class="settings-row">
        <button class="btn-secondary" onclick="connectDrive()">Drive に接続してデータを読み込む</button>
      </div>
    </div>

    <div class="settings-section">
      <h2>📊 データ情報</h2>
      <div class="settings-row">
        <p class="hint">データは端末の localStorage に保存され、Drive 接続後は自動でクラウドに同期されます。</p>
      </div>
      <div class="settings-row">
        <button class="btn-secondary" onclick="syncNow()">今すぐ Drive に保存</button>
      </div>
    </div>
  </div>

  <!-- ─── ボトムナビ ─── -->
  <nav class="bottom-nav">
    <button class="tab-btn active" data-tab="stock">
      <span class="tab-icon">📦</span>在庫
    </button>
    <button class="tab-btn" data-tab="shopping">
      <span class="tab-icon" style="position:relative">
        🛒
        <span id="shoppingBadge" class="shopping-badge hidden"></span>
      </span>買い物
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon">⚙️</span>設定
    </button>
  </nav>

  <div id="characterPeek" class="character-peek" aria-live="polite"></div>

</div><!-- /app-shell -->

<!-- ─── FAB ─── -->
<button id="stockFab"    class="fab"        onclick="openAddItem()"    aria-label="品目を追加">＋</button>
<button id="shoppingFab" class="fab hidden" onclick="openAddShopItem()" aria-label="買い物を追加">＋</button>

<!-- ─── 品目モーダル ─── -->
<div id="itemModal" class="modal-overlay">
  <div class="modal-sheet" role="dialog" aria-labelledby="modalTitle">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="modalTitle">品目を追加</h2>
      <button class="modal-close" onclick="closeModal('itemModal')" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label for="itemName">品名 *</label>
        <input type="text" id="itemName" placeholder="例: 牛乳" autocomplete="off">
      </div>
      <div class="form-row">
        <label for="itemCategory">カテゴリ</label>
        <select id="itemCategory">
          <option value="refrigerator">🧊 冷蔵庫</option>
          <option value="pantry">🏠 常温</option>
          <option value="bathroom">🚿 水回り</option>
          <option value="medicine">💊 薬</option>
          <option value="other">📦 その他</option>
        </select>
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label for="itemQty">現在の在庫数</label>
          <input type="number" id="itemQty" min="0" step="0.5" value="1">
        </div>
        <div class="form-row">
          <label for="itemUnit">単位</label>
          <select id="itemUnit" class="unit-select"></select>
        </div>
      </div>
      <div class="form-row">
        <label for="itemMinQty">最小在庫数（これ以下で買い物リストへ）</label>
        <input type="number" id="itemMinQty" min="0" step="0.5" value="1">
      </div>
      <div class="form-row">
        <label for="itemExpiry">賞味・使用期限</label>
        <input type="date" id="itemExpiry">
      </div>
      <div class="form-row">
        <label for="itemNote">メモ</label>
        <input type="text" id="itemNote" placeholder="例: 開封済み、定期購入など">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveItem()">保存</button>
      <button id="deleteItemBtn" class="btn-danger hidden" onclick="deleteItem()">削除</button>
    </div>
  </div>
</div>

<!-- ─── 買い物追加モーダル ─── -->
<div id="shopModal" class="modal-overlay">
  <div class="modal-sheet" role="dialog" aria-label="買い物を追加">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2>買い物を追加</h2>
      <button class="modal-close" onclick="closeModal('shopModal')" aria-label="閉じる">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label for="shopItemName">品名 *</label>
        <input type="text" id="shopItemName" placeholder="例: トイレットペーパー" autocomplete="off">
      </div>
      <div class="form-row-2">
        <div class="form-row">
          <label for="shopItemQty">数量</label>
          <input type="number" id="shopItemQty" min="1" step="1" value="1">
        </div>
        <div class="form-row">
          <label for="shopItemUnit">単位</label>
          <select id="shopItemUnit" class="unit-select"></select>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveShopItem()">追加</button>
    </div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
